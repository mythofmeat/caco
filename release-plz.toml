# release-plz configuration.
#
# All caco-* crates share a single workspace version (workspace.package.version
# in the root Cargo.toml). On every push to main, release-plz opens or updates
# a "Release vX.Y.Z" PR. Merging it bumps the workspace version, prepends a
# shared workspace entry to CHANGELOG.md, and pushes the v{{ version }} tag
# from the caco-cli package.
# The tag push then triggers .github/workflows/package.yml which builds the
# Arch packages and — only after the build succeeds — creates the GitHub
# Release. release-plz itself does NOT create the GitHub Release, so users
# never see a vX.Y.Z release that lacks working Arch artifacts.

[workspace]
# Distribution is via Arch packages, not crates.io. `publish = false` keeps
# release-plz from publishing or requiring registry tokens; `git_only = true`
# tells release-plz to use git tags (not crates.io) as the source of truth
# for "currently published version". Without git_only, release-pr silently
# emits {"prs":[]} for every push because caco-* aren't on crates.io and
# release-plz can't determine whether a bump is needed.
#
# git_only is safe now that v3.2.4 and v3.2.5 are both package-verified
# tags: git-only mode packages the previous tag before calculating the next
# version, so it requires the latest tag to be cleanly packageable.
publish = false
git_only = true
semver_check = false
repo_url = "https://github.com/mythofmeat/caco"
pr_name = "Release v{{ version }}"
# Default: no per-package git tag, and no GitHub release from release-plz at
# all. The single umbrella tag is owned by caco-cli below; the GitHub Release
# is created by package.yml after Arch packaging succeeds.
git_release_enable = false
git_tag_enable = false
# Plain `v{{ version }}` for every crate. The multi-package workspace default
# is `{{ package }}-v{{ version }}`, but this repo uses only the shared `v*`
# tags pushed from caco-cli. Only caco-cli has git_tag_enable=true, so this
# pattern is used for creating a tag only on caco-cli; the other crates use it
# for tag-existence checks.
git_tag_name = "v{{ version }}"
# Only bumping conventional types trigger a release. This is the actual
# release-loop breaker: release PRs are squash-merged as "Release vX.Y.Z (#N)",
# which doesn't match this regex, so merging a release PR can never spawn the
# next one. (The `^Release v` skip in commit_parsers below is cosmetic only —
# per release-plz docs, changelog-skipped commits still count toward the
# version bump; release_commits alone gates whether a release is triggered.
# Learned the hard way: v3.3.1–v3.3.3 were empty self-spawned releases.)
# Side effect, as documented in CLAUDE.md: non-conventional and
# chore/docs/ci/etc. commits no longer trigger releases on their own, though
# the changelog catch-all still lists non-conventional ones when they ride
# along with a real release.
release_commits = "^(feat|fix|perf|refactor|revert)[(:!]"

# Lockstep version group: every workspace crate shares the same next version,
# so a release driven by changes in any single crate still produces one
# coordinated workspace bump (and therefore one v{{ version }} tag from the
# caco-cli package below). version_group is a per-package field — workspace
# defaults do not propagate it — so it has to be listed on each crate.
[[package]]
name = "caco-core"
version_group = "caco"
changelog_path = "./CHANGELOG.md"

[[package]]
name = "caco-sources"
version_group = "caco"
changelog_path = "./CHANGELOG.md"

[[package]]
name = "caco-tui"
version_group = "caco"
changelog_path = "./CHANGELOG.md"

[[package]]
name = "caco-gui"
version_group = "caco"
changelog_path = "./CHANGELOG.md"

[[package]]
name = "caco-mcp"
version_group = "caco"
changelog_path = "./CHANGELOG.md"

# Umbrella package: owns the single workspace-wide git tag. The GitHub
# Release itself is created downstream by package.yml after Arch packaging
# succeeds, so git_release_enable stays at the workspace default (false).
[[package]]
name = "caco-cli"
version_group = "caco"
changelog_path = "./CHANGELOG.md"
git_tag_enable = true

[changelog]
header = """
# Changelog

All notable changes to Caco are documented in this file.
Format based on [Keep a Changelog](https://keepachangelog.com/en/1.1.0/).
"""
# Keep the version at the start of the heading so release-plz can parse the
# latest changelog entry on subsequent runs.
body = """
## [{{ version | trim_start_matches(pat=\"v\") }}] - {{ timestamp | date(format=\"%Y-%m-%d\") }}
{% for group, commits in commits | group_by(attribute=\"group\") %}
### {{ group | upper_first }}
{% for commit in commits %}
- {% if commit.scope %}**{{ commit.scope }}**: {% endif %}{{ commit.message | upper_first }}
{%- endfor %}
{% endfor %}
"""
trim = true
commit_parsers = [
  # Keep squash-merged release commits ("Release vX.Y.Z (#N)") out of the
  # changelog body. Changelog-only: this does NOT stop the commit from
  # triggering a bump — `release_commits` in [workspace] is the loop breaker.
  { message = "^Release v", skip = true },
  { message = "^feat",     group = "Added" },
  { message = "^fix",      group = "Fixed" },
  { message = "^refactor", group = "Changed" },
  { message = "^perf",     group = "Changed" },
  { message = "^revert",   group = "Changed" },
  { message = "^docs",     skip  = true },
  { message = "^chore",    skip  = true },
  { message = "^test",     skip  = true },
  { message = "^ci",       skip  = true },
  { message = "^build",    skip  = true },
  { message = "^style",    skip  = true },
  # Catch-all: legacy non-conventional squash titles (`Add ...`,
  # `Stats reporter: ...`) would otherwise be omitted from the changelog
  # body. They don't trigger releases (see release_commits), but still get
  # listed when they ride along with one.
  { message = ".*",         group = "Changed" },
]
