name: Build and publish Arch packages

on:
  push:
    tags: ['v*']

jobs:
  publish:
    permissions:
      contents: write
    uses: mythofmeat/repo-arch/.github/workflows/publish-arch-rust.yml@main
    with:
      pkgbuild_dir: contrib/arch
      extra_pacman_packages: "wayland libxkbcommon fontconfig"
    secrets: inherit

  # Guarantee a GitHub Release exists only after Arch packaging has succeeded
  # (via `needs: publish`) — a failed Arch build never produces a published
  # Release with no artifacts. Release notes are auto-generated from the
  # conventional-commit history; we deliberately do NOT extract them from
  # CHANGELOG.md. (CHANGELOG.md is not reliably updated under this workspace's
  # release-plz config: `release_commits` gates the changelog update per crate,
  # and the crate that owns the shared CHANGELOG.md + git tag — caco-cli —
  # rarely has a directly-matching commit, so it bumps as a dependency-only
  # release and writes no changelog section. Reading it here used to hard-fail
  # the release on the missing section.)
  release:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Ensure a GitHub Release exists with auto-generated notes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # The Arch publish job already creates the Release (with git-cliff
          # notes) to hold the package artifacts, so normally this is a no-op
          # safety net. If for any reason the Release is missing, create it
          # with GitHub's auto-generated notes. Never overwrite existing notes.
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            echo "Release $GITHUB_REF_NAME already exists; leaving its notes as-is."
          else
            gh release create "$GITHUB_REF_NAME" \
              --title "$GITHUB_REF_NAME" \
              --generate-notes
          fi
