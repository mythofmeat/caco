name: release-plz

on:
  push:
    branches: [main]

concurrency:
  group: release-plz-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-plz:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      # release-plz with git_only=true verifies the previous tag by running
      # `cargo package --workspace` in a SEPARATE temp worktree per crate
      # (release-plz hardcodes the verify build; publish_no_verify only
      # affects `cargo publish`). All six worktrees stay alive until the
      # version calculation finishes, so six full debug target/ dirs coexist
      # in /tmp — which blew past the runner's ~14GB free disk starting
      # 2026-06-11 ("rustc-LLVM ERROR: IO failure on output stream: No space
      # left on device"). Drop the preinstalled toolchains we never use
      # (~25GB) before building.
      - name: Free runner disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android \
            /opt/ghc /usr/local/.ghcup /opt/hostedtoolcache/CodeQL \
            /usr/local/share/powershell /usr/share/swift
          df -h /
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.REPO_ARCH_TOKEN }}
      - uses: dtolnay/rust-toolchain@stable
      # `.cargo/config.toml` pins the linux-gnu linker to clang + mold for
      # local dev. release-plz with git_only=true runs `cargo package` to
      # verify the previous tag, so the Ubuntu runner needs both available
      # or cargo errors with `invalid linker name in argument '-fuse-ld=mold'`.
      - name: Install mold linker
        run: sudo apt-get update && sudo apt-get install -y mold clang
      # Cache the cargo registry index and downloaded crate sources.
      # release-plz with git_only=true runs `cargo package --workspace` in a
      # fresh temp worktree per package, so the per-run target/ can't be
      # reused — but the cargo registry can. Compile cost still dominates,
      # but caching the registry shaves several minutes off "Updating
      # crates.io index" + "Downloaded foo v1.2.3" work.
      #
      # We deliberately do NOT redirect CARGO_TARGET_DIR to a persistent
      # path: cargo's `package` verify step strips path deps from the
      # generated tarball and only resolves them via workspace overrides
      # when target/ lives inside the worktree. Pointing it elsewhere
      # breaks the rebuild with "no matching package named `caco-core`".
      - uses: Swatinem/rust-cache@v2
        with:
          cache-targets: false
          shared-key: release-plz-registry
      # release-pr and release are split into two explicit invocations so we
      # can suppress release-pr on the merge of a "Release vX" PR.
      #
      # Why: with git_only=true, release-pr computes the next version against
      # the latest *git tag*. But the tag for a just-merged release is not
      # created until the `release` step runs later in the SAME push. So right
      # after a Release PR merges, release-pr sees Cargo.toml already bumped
      # (e.g. 3.3.4) against the stale latest tag (v3.3.3), treats the real
      # commit as still-unreleased, and opens a phantom follow-up PR (v3.3.5)
      # containing no actual commits. Skipping release-pr when the head commit
      # is a "Release vX" merge removes that race — and re-breaks the older
      # self-release loop at its source. The squash-merge commit message for a
      # Release PR is its title ("Release vX.Y.Z (#N)"), so the prefix match is
      # reliable. The `release` step always runs, so the just-merged version
      # still gets its v* tag pushed.
      - name: release-plz release-pr
        if: ${{ !startsWith(github.event.head_commit.message, 'Release v') }}
        uses: release-plz/action@v0.5
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.REPO_ARCH_TOKEN }}
          # The verify builds only need to compile, not be debuggable or
          # rebuilt incrementally. debuginfo=2 + incremental caches are the
          # bulk of each worktree's target/ size; stripping them keeps the
          # six concurrent worktrees comfortably inside the runner's disk
          # and shaves build time.
          CARGO_PROFILE_DEV_DEBUG: "0"
          CARGO_INCREMENTAL: "0"
      - name: release-plz release
        uses: release-plz/action@v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.REPO_ARCH_TOKEN }}
          CARGO_PROFILE_DEV_DEBUG: "0"
          CARGO_INCREMENTAL: "0"
