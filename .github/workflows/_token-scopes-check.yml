name: _token-scopes-check

on:
  push:
    paths:
      - .github/workflows/_token-scopes-check.yml

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Probe REPO_ARCH_TOKEN permissions on this repo
        env:
          TOKEN: ${{ secrets.REPO_ARCH_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "::error::REPO_ARCH_TOKEN secret is not set on $REPO"
            exit 1
          fi

          probe() {
            local label="$1" path="$2"
            local code
            code=$(curl -sS -o /dev/null -w "%{http_code}" \
              -H "Authorization: token $TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com$path")
            printf "  %-25s GET %s -> HTTP %s\n" "$label" "$path" "$code"
          }

          echo "=== Token presence: OK (length=${#TOKEN}) ==="
          echo
          echo "=== Probes against $REPO ==="
          probe "repo metadata"  "/repos/$REPO"
          probe "list PRs"       "/repos/$REPO/pulls?state=open&per_page=1"
          probe "list refs"      "/repos/$REPO/git/refs/heads"
          probe "list branches"  "/repos/$REPO/branches"

          echo
          echo "All four should be HTTP 200. Anything 403/404 = missing permission."
