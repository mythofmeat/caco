# Caco configuration
# Copy to ~/.config/caco/config.toml

# Default sourceport path
# sourceport = "/usr/bin/gzdoom"

# Default IWAD for playing WADs
# With iwad_dirs set, you can use short names like "doom2" instead of full paths
# iwad = "doom2"

# Directories to search for IWADs (searched in order)
# iwad_dirs = ["/usr/share/games/doom", "~/.steam/steam/steamapps/common/Doom 2/base"]

# Default arguments passed to sourceport
# sourceport_args = ["-nomusic", "-nosfx"]

# Library database file path
# db_path = "~/.local/share/caco/library.db"

# WAD cache directory (downloaded WADs are stored here)
# cache_dir = "~/.cache/caco/wads"

# Preferred idgames download mirror (0-4)
# 0 = youfailit.net (default, fastest)
# 1 = quaddicted.com
# 2 = infania.net
# 3 = braindrainlan.nu
# 4 = xvertigox.com
# download_mirror = 0

# List display configuration
# [list]

# Columns to display (available: id, title, author, status, tags, beaten, playtime, last_played)
# format = ["id", "title", "author", "status", "beaten", "playtime", "last_played"]

# Default sort order (e.g., "title", "author", "playtime", "-last_played" for descending)
# sort = ""

# Default status filter (empty array shows all statuses)
# default_status = []

# Cache auto-cleanup settings
# Maximum cache size in GB (0 = unlimited)
# cache_max_size_gb = 0

# Remove cached files not played in N days (0 = never expire)
# cache_max_age_days = 0

# Automatically clean cache before downloading new WADs
# cache_auto_clean = false
